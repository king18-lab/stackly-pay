<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly · loader only</title>
    <!-- No body styling that could interfere -->
</head>
<!-- No background, no body CSS – just the loader element -->
<!-- You can drop this into any existing page without affecting layout -->
<div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%;">
    <!-- STACKLY LOADER – standalone, zero overlap risk -->
    <div style="background: rgba(16, 22, 42, 0.9); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(79, 146, 255, 0.35); border-radius: 64px; padding: 2.5rem 2.5rem; box-shadow: 0 40px 70px -15px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(69, 128, 255, 0.25) inset; width: 440px; max-width: 100%;">
        
        <!-- header -->
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 2rem;">
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <span style="display: block; width: 30px; height: 7px; background: #3d7eff; border-radius: 20px; box-shadow: 0 0 15px #3d7effcc;"></span>
                <span style="display: block; width: 24px; height: 7px; background: #5f8cff; border-radius: 20px; box-shadow: 0 0 15px #3d7effcc; opacity: 0.85;"></span>
                <span style="display: block; width: 18px; height: 7px; background: #88adff; border-radius: 20px; box-shadow: 0 0 15px #3d7effcc; opacity: 0.7;"></span>
            </div>
            <div style="font-size: 1.9rem; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(120deg, #f0f5ff, #c6dbff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-left: 6px;">
                STACKLY <small style="font-size: 1rem; font-weight: 400; color: #7f9fdf; margin-left: 4px;">pay</small>
            </div>
            <div style="margin-left: auto; background: #1e274b; border-radius: 60px; padding: 0.4rem 1.2rem; border: 1px solid #30427a; font-size: 1rem; font-weight: 600; color: #b7d0ff; box-shadow: 0 6px 14px rgba(0,10,30,0.6); display: flex; align-items: center; gap: 8px;">
                <span style="width: 12px; height: 12px; background: #28d87a; border-radius: 50%; box-shadow: 0 0 14px #20e07a; animation: pulse-green 1.2s infinite;"></span>
                <span>3s</span>
            </div>
        </div>

        <!-- stacked cards -->
        <div style="position: relative; height: 120px; margin: 2rem 0; display: flex; justify-content: center; align-items: center;">
            <div style="position: absolute; width: 280px; height: 88px; background: linear-gradient(145deg, #262f54, #1b2348); border-radius: 28px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 22px 34px -14px black, 0 0 0 1px #2f3e70 inset; transform: translateY(-18px) rotate(-2.2deg); background: linear-gradient(145deg, #2f3864, #212b56); z-index: 1; border-bottom: 2px solid #3f64cc;"></div>
            <div style="position: absolute; width: 280px; height: 88px; background: linear-gradient(145deg, #262f54, #1b2348); border-radius: 28px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 22px 34px -14px black, 0 0 0 1px #2f3e70 inset; transform: translateY(-2px) rotate(-0.3deg); background: linear-gradient(145deg, #36437e, #253067); z-index: 2; border-bottom: 2px solid #4b7aff;"></div>
            <div style="position: absolute; width: 280px; height: 88px; background: linear-gradient(145deg, #262f54, #1b2348); border-radius: 28px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 22px 34px -14px black, 0 0 0 1px #2f3e70 inset; transform: translateY(14px) rotate(2deg); background: linear-gradient(145deg, #212d62, #192256); z-index: 0; border-bottom: 2px solid #3451b0;"></div>
            
            <!-- floating icon -->
            <div style="position: absolute; z-index: 10; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 12px; background: rgba(12,20,40,0.7); backdrop-filter: blur(7px); padding: 0.7rem 1.5rem; border-radius: 60px; border: 1px solid #4065d0; box-shadow: 0 12px 28px -6px #0a1025; align-items: center;">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
                    <path d="M20 6H4V8H20V6Z" fill="#8AAEFF"/>
                    <path d="M4 10H20V12H4V10Z" fill="#AAC5FF"/>
                    <path d="M4 14H14V16H4V14Z" fill="#CCDCFF"/>
                    <rect x="16" y="14" width="4" height="4" rx="1.5" fill="#3d7eff" stroke="#E0EDFF" stroke-width="1.2"/>
                    <circle cx="18" cy="16" r="1" fill="white" fill-opacity="0.7"/>
                </svg>
                <span style="color: white; font-weight: 600; font-size: 1.3rem; background: linear-gradient(180deg,#ffffff,#c5dbff); -webkit-background-clip: text; background-clip: text; color: transparent;">⚡</span>
            </div>
        </div>

        <!-- progress bar 3s -->
        <div style="width: 100%; height: 10px; background: #1d254a; border-radius: 40px; margin: 2.2rem 0 1.4rem; border: 1px solid #2f4070; overflow: hidden; box-shadow: inset 0 2px 7px #0b1022;">
            <div style="height: 100%; width: 0%; background: linear-gradient(90deg, #3d7eff, #85b4ff, #3d7eff); border-radius: 40px; box-shadow: 0 0 24px #3f7bff; animation: load3s 3s cubic-bezier(0.17, 0.85, 0.44, 1) forwards;" id="progressFill"></div>
        </div>

        <!-- status row -->
        <div style="display: flex; justify-content: space-between; align-items: center; color: #aec2f0; font-size: 0.95rem;">
            <div style="display: flex; align-items: center; gap: 6px;">
                <span style="font-size: 1.3rem; filter: drop-shadow(0 0 5px #3d7eff);">🔒</span>
                <span>authorizing • stack secure</span>
            </div>
            <div style="color: #d9e6ff; background: #202e58; padding: 0.3rem 1rem; border-radius: 40px; border: 1px solid #3a5090; font-weight: 600;" id="countdownHint">3.0s</div>
        </div>

        <!-- footer row -->
        <div style="display: flex; gap: 16px; margin-top: 1.2rem; align-items: center; color: #6b83b5; font-size: 0.8rem; border-top: 1px dashed #27345c; padding-top: 1.1rem;">
            <span>📇 VISA · MC · AMEX</span>
            <span style="animation: blink 1.8s infinite;">⚙️ 3D secure</span>
            <span>🔄 tokenizing</span>
        </div>
    </div>
</div>

<!-- animations (safe, no body styling) -->
<style>
    @keyframes pulse-green {
        0% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.15); background: #5affa8; }
        100% { opacity: 0.6; transform: scale(1); }
    }
    
    @keyframes load3s {
        0% { width: 0%; }
        100% { width: 100%; }
    }
    
    @keyframes blink {
        0% { opacity: 0.7; }
        50% { opacity: 1; text-shadow: 0 0 5px #adc6ff; }
        100% { opacity: 0.7; }
    }
</style>

<!-- countdown script -->
<script>
    (function() {
        const countdownEl = document.getElementById('countdownHint');
        if (!countdownEl) return;
        
        let seconds = 3.0;
        const interval = setInterval(() => {
            seconds = Math.max(0, seconds - 0.1);
            if (seconds > 0) {
                countdownEl.textContent = seconds.toFixed(1) + 's';
            } else {
                countdownEl.textContent = '✅ done';
                clearInterval(interval);
            }
        }, 100);
    })();
</script>
